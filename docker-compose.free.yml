# Docker Compose - 0成本版本
# 使用本地服务，不依赖付费云服务

version: '3.8'

services:
  # 本地PostgreSQL (替代Supabase)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: salesmind
      POSTGRES_PASSWORD: salesmind_local
      POSTGRES_DB: salesmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesmind"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=8MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_connections=50

  # 本地Redis (缓存 + 消息队列)
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 后端API
  backend:
    build: ./backend
    environment:
      # 使用本地数据库
      DATABASE_URL: postgresql://salesmind:salesmind_local@db:5432/salesmind
      REDIS_URL: redis://redis:6379/0

      # 本地开发配置
      DEBUG: "true"
      SECRET_KEY: local-dev-key-change-in-production

      # AI配置 - 使用免费API
      # 方案1: Gemini Flash (免费1500/天)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # 方案2: Groq (免费20/min)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}

      # 邮件配置 - 使用控制台输出
      EMAIL_BACKEND: console  # console | resend | smtp
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: noreply@localhost

      # Celery配置
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: >
      sh -c "cd /app &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug"
    # 资源限制 (适合低配VPS)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Celery Worker (异步任务)
  celery-worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://salesmind:salesmind_local@db:5432/salesmind
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: local-dev-key-change-in-production
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      EMAIL_BACKEND: console
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: noreply@localhost
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: >
      sh -c "cd /app && celery -A app.core.celery_app worker --loglevel=info --concurrency=2"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # Celery Beat (定时任务)
  celery-beat:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://salesmind:salesmind_local@db:5432/salesmind
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: local-dev-key-change-in-production
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - celery_beat_data:/app/celerybeat
    command: >
      sh -c "cd /app && celery -A app.core.celery_app beat --loglevel=info"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M

  # 前端 (Next.js)
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Nginx (反向代理 + 静态文件)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  # 监控 - Prometheus (可选)
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    profiles: ["monitoring"]  # 默认不启动
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M

  # 监控 - Grafana (可选)
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    profiles: ["monitoring"]
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M

volumes:
  postgres_data:
  redis_data:
  celery_beat_data:
  prometheus_data:
  grafana_data:

# 资源限制 (适合 $5/月 VPS)
# Hetzner CX11: 1 vCPU, 2GB RAM
# 所有服务加起来大约使用 1.5GB RAM
